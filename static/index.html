<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Company Intelligence Dashboard</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400&display=swap");

      :root {
        --page: #f0ede8;
        --surface: #ebe8e3;
        --black: #0d0d0d;
        --body: #5a5750;
        --muted: #9a9690;
        --line: rgba(13, 13, 13, 0.10);
        --line-soft: rgba(13, 13, 13, 0.06);
        --input-line: rgba(13, 13, 13, 0.20);
        --success: #8a9a78;
        --idle-dot: #d0cdc8;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--page);
        color: var(--body);
        font-family: "Jost", sans-serif;
        font-weight: 300;
        letter-spacing: 0.06em;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 1px solid var(--black);
        background: transparent;
        color: var(--black);
        cursor: pointer;
        font-family: "Jost", sans-serif;
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.22em;
        line-height: 1;
        padding: 12px 36px;
        text-transform: uppercase;
        transition: all 0.4s ease;
      }

      button:hover,
      button:focus-visible {
        background: var(--black);
        color: var(--page);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.45;
      }

      button:disabled:hover {
        background: transparent;
        color: var(--black);
      }

      .site-header {
        align-items: center;
        background: var(--surface);
        border-bottom: 1px solid var(--line);
        display: flex;
        height: 52px;
        justify-content: space-between;
        padding: 0 48px;
      }

      .wordmark {
        color: var(--black);
        font-family: "Cormorant Garamond", serif;
        font-size: 15px;
        font-weight: 300;
        letter-spacing: 0.28em;
        text-decoration: none;
        text-transform: uppercase;
      }

      .nav {
        display: flex;
        gap: 32px;
      }

      .nav a {
        color: var(--muted);
        font-family: "Jost", sans-serif;
        font-size: 11px;
        font-weight: 200;
        letter-spacing: 0.18em;
        text-decoration: none;
        text-transform: uppercase;
        transition: color 0.3s ease;
      }

      .nav a:hover {
        color: var(--black);
      }

      main {
        margin: 0 auto;
        max-width: 860px;
        width: calc(100% - 48px);
      }

      .hero {
        padding: 80px 0 60px;
        text-align: center;
      }

      .hero-title {
        margin: 0;
      }

      .title-line {
        color: var(--black);
        display: block;
        font-family: "Cormorant Garamond", serif;
        font-size: 52px;
        font-weight: 300;
        letter-spacing: 0.22em;
        line-height: 1.08;
        text-transform: uppercase;
      }

      .hero-rule {
        background: var(--black);
        height: 1px;
        margin: 28px auto;
        opacity: 0.45;
        width: 40px;
      }

      .hero-subtitle {
        color: var(--muted);
        font-size: 12px;
        font-weight: 200;
        letter-spacing: 0.20em;
        margin: 0;
        text-transform: uppercase;
      }

      section {
        padding: 80px 0;
      }

      .section-label {
        color: var(--muted);
        font-size: 10px;
        font-weight: 300;
        letter-spacing: 0.24em;
        margin: 0 0 40px;
        text-transform: uppercase;
      }

      .input-grid {
        display: grid;
        gap: 48px;
        grid-template-columns: 1fr 1fr;
      }

      label {
        color: var(--muted);
        display: block;
        font-size: 10px;
        font-weight: 300;
        letter-spacing: 0.20em;
        text-transform: uppercase;
      }

      input {
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--input-line);
        color: var(--black);
        display: block;
        font-size: 13px;
        font-weight: 300;
        letter-spacing: 0.06em;
        margin-top: 10px;
        outline: none;
        padding: 8px 0;
        transition: border-bottom-color 0.3s ease;
        width: 100%;
      }

      input::placeholder {
        color: var(--muted);
      }

      input:focus {
        border-bottom-color: var(--black);
      }

      .form-actions {
        margin-top: 40px;
      }

      .stepper {
        margin-top: 40px;
        opacity: 1;
        transition: opacity 0.6s ease;
      }

      .stepper[hidden] {
        display: none;
      }

      .stepper.is-fading {
        opacity: 0;
      }

      .step-row {
        align-items: center;
        display: grid;
        gap: 16px;
        grid-template-columns: 28px 1fr 8px;
      }

      .roman {
        color: var(--muted);
        font-size: 11px;
        font-weight: 200;
        letter-spacing: 0.10em;
      }

      .step-name {
        color: var(--muted);
        display: inline-block;
        font-size: 12px;
        font-weight: 300;
        letter-spacing: 0.14em;
        line-height: 1.4;
        position: relative;
        text-transform: uppercase;
        width: fit-content;
      }

      .step-name::after {
        background: rgba(13, 13, 13, 0.35);
        content: "";
        height: 1px;
        left: 0;
        position: absolute;
        top: 50%;
        transition: width 0.4s ease;
        width: 0;
      }

      .dot {
        background: var(--idle-dot);
        height: 5px;
        width: 5px;
      }

      .step-row.active .step-name,
      .step-row.done .step-name {
        color: var(--black);
      }

      .step-row.active .dot {
        animation: dotPulse 1s infinite;
        background: var(--black);
      }

      .step-row.done .dot {
        animation: none;
        background: var(--success);
      }

      .step-row.done .step-name::after {
        width: 100%;
      }

      .step-divider {
        background: var(--line-soft);
        height: 1px;
        margin: 12px 0;
      }

      .progress-track {
        background: rgba(13, 13, 13, 0.08);
        height: 1px;
        margin-top: 28px;
        width: 100%;
      }

      .progress-fill {
        background: var(--black);
        height: 1px;
        transition: width 3.5s linear;
        width: 0%;
      }

      .result-block {
        margin-top: 56px;
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.7s ease, transform 0.7s ease;
      }

      .result-block[hidden] {
        display: none;
      }

      .result-block.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .company-heading {
        color: var(--black);
        font-family: "Cormorant Garamond", serif;
        font-size: 32px;
        font-weight: 300;
        letter-spacing: 0.14em;
        line-height: 1.15;
        margin: 0 0 4px;
        text-transform: uppercase;
      }

      .company-url {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.10em;
        margin: 0;
        overflow-wrap: anywhere;
      }

      .full-rule {
        background: var(--line);
        height: 1px;
        margin: 24px 0 0;
        width: 100%;
      }

      .field-row {
        border-bottom: 1px solid var(--line-soft);
        display: flex;
        gap: 24px;
        padding: 14px 0;
      }

      .field-label {
        color: var(--muted);
        flex-shrink: 0;
        font-size: 10px;
        font-weight: 300;
        letter-spacing: 0.20em;
        text-transform: uppercase;
        width: 160px;
      }

      .field-value {
        color: var(--black);
        flex: 1;
        font-size: 13px;
        font-weight: 300;
        line-height: 1.7;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .mail-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .mail-pill {
        border: 1px solid rgba(13, 13, 13, 0.15);
        color: var(--body);
        display: inline-block;
        font-size: 11px;
        font-weight: 300;
        line-height: 1.3;
        padding: 3px 10px;
      }

      .outreach-text {
        border-left: 2px solid rgba(13, 13, 13, 0.15);
        color: var(--black);
        font-family: "Cormorant Garamond", serif;
        font-size: 16px;
        font-style: italic;
        font-weight: 300;
        letter-spacing: 0.04em;
        line-height: 1.8;
        padding-left: 20px;
      }

      .copy-button {
        margin-top: 14px;
        padding: 7px 20px;
      }

      .section-divider {
        padding: 0;
      }

      .divider-rule {
        background: var(--line);
        height: 1px;
        width: 100%;
      }

      .divider-mark {
        color: rgba(13, 13, 13, 0.25);
        font-family: "Cormorant Garamond", serif;
        font-size: 16px;
        margin: 40px 0;
        text-align: center;
      }

      .results-actions {
        margin-bottom: 40px;
      }

      .results-list {
        border-top: 1px solid var(--line-soft);
      }

      .result-row {
        border-bottom: 1px solid var(--line-soft);
      }

      .result-summary {
        align-items: center;
        cursor: default;
        display: grid;
        gap: 24px;
        grid-template-columns: minmax(160px, 0.8fr) minmax(0, 1fr) auto;
        padding: 18px 0;
        transition: background 0.25s ease, padding 0.25s ease;
      }

      .result-summary:hover {
        background: rgba(13, 13, 13, 0.03);
        padding-left: 12px;
        padding-right: 12px;
      }

      .list-company {
        color: var(--black);
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        font-weight: 300;
        letter-spacing: 0.10em;
        text-transform: uppercase;
      }

      .list-service {
        color: var(--body);
        font-size: 12px;
        font-weight: 300;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .view-button {
        border: none;
        padding: 0;
      }

      .view-button:hover,
      .view-button:focus-visible {
        background: transparent;
        color: var(--black);
        text-decoration: underline;
        text-underline-offset: 5px;
      }

      .expanded-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.5s ease;
      }

      .result-row.open .expanded-content {
        max-height: 600px;
      }

      .expanded-line {
        background: rgba(13, 13, 13, 0.12);
        height: 1px;
        transition: width 0.4s ease;
        width: 0;
      }

      .result-row.open .expanded-line {
        width: 100%;
      }

      .expanded-inner {
        padding-bottom: 22px;
      }

      .empty-state {
        padding: 32px 0 0;
        text-align: center;
      }

      .empty-main {
        color: var(--muted);
        font-family: "Cormorant Garamond", serif;
        font-size: 18px;
        font-style: italic;
        font-weight: 300;
        letter-spacing: 0.04em;
        margin: 0 0 12px;
      }

      .empty-sub {
        color: var(--muted);
        font-size: 11px;
        font-weight: 200;
        letter-spacing: 0.16em;
        margin: 0;
        text-transform: uppercase;
      }

      .toast {
        background: var(--black);
        color: var(--page);
        left: 50%;
        opacity: 0;
        padding: 10px 28px;
        pointer-events: none;
        position: fixed;
        top: 18px;
        transform: translate(-50%, -20px);
        transition: opacity 0.35s ease, transform 0.35s ease;
        z-index: 20;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .toast-text {
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      @keyframes dotPulse {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.4;
          transform: scale(1.8);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .title-line,
        .hero-rule,
        .hero-subtitle {
          animation: fadeUp 0.8s ease both;
        }

        .title-line:nth-child(2) {
          animation-delay: 0.15s;
        }

        .hero-rule,
        .hero-subtitle {
          animation-delay: 0.45s;
        }
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 760px) {
        .site-header {
          height: auto;
          padding: 18px 24px;
        }

        .nav {
          gap: 18px;
        }

        main {
          width: calc(100% - 32px);
        }

        .title-line {
          font-size: 40px;
          letter-spacing: 0.16em;
        }

        section {
          padding: 64px 0;
        }

        .input-grid {
          gap: 28px;
          grid-template-columns: 1fr;
        }

        .field-row {
          display: block;
        }

        .field-label {
          margin-bottom: 8px;
          width: auto;
        }

        .result-summary {
          grid-template-columns: 1fr auto;
        }

        .list-service {
          grid-column: 1 / -1;
          grid-row: 2;
          white-space: normal;
        }
      }

      @media (max-width: 560px) {
        .site-header {
          align-items: flex-start;
          display: grid;
          gap: 14px;
        }

        .hero {
          padding-top: 64px;
        }

        .title-line {
          font-size: 32px;
        }

        button {
          width: 100%;
        }

        .copy-button,
        .view-button {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div class="toast" id="toast" aria-live="polite" aria-atomic="true">
      <span class="toast-text" id="toast-text"></span>
    </div>

    <header class="site-header">
      <a class="wordmark" href="#">IntelliEnrich</a>
      <nav class="nav" aria-label="Primary navigation">
        <a href="#enrich">Enrich</a>
        <a href="#results-section">Results</a>
        <a href="#docs">Docs</a>
      </nav>
    </header>

    <main>
      <section class="hero" aria-labelledby="hero-title">
        <h1 class="hero-title" id="hero-title">
          <span class="title-line">Company</span>
          <span class="title-line">Intelligence</span>
        </h1>
        <div class="hero-rule" aria-hidden="true"></div>
        <p class="hero-subtitle">Journey beyond surface data</p>
      </section>

      <section id="enrich" aria-labelledby="enrich-label">
        <p class="section-label" id="enrich-label">01 — Enrich</p>
        <form id="enrich-form">
          <div class="input-grid">
            <label>
              Website Name
              <input id="website-name" name="website_name" placeholder="e.g. Stripe" autocomplete="organization" />
            </label>
            <label>
              Company URL
              <input id="company-url" name="url" placeholder="https://stripe.com" autocomplete="url" required />
            </label>
          </div>
          <div class="form-actions">
            <button id="enrich-button" type="submit">Enrich Company &rarr;</button>
          </div>
        </form>

        <div class="stepper" id="stepper" hidden>
          <div class="step-row" data-step="0">
            <span class="roman">I.</span>
            <span class="step-name">Discovering pages</span>
            <span class="dot" aria-hidden="true"></span>
          </div>
          <div class="step-divider"></div>
          <div class="step-row" data-step="1">
            <span class="roman">II.</span>
            <span class="step-name">Scraping content</span>
            <span class="dot" aria-hidden="true"></span>
          </div>
          <div class="step-divider"></div>
          <div class="step-row" data-step="2">
            <span class="roman">III.</span>
            <span class="step-name">Cleaning text</span>
            <span class="dot" aria-hidden="true"></span>
          </div>
          <div class="step-divider"></div>
          <div class="step-row" data-step="3">
            <span class="roman">IV.</span>
            <span class="step-name">AI analysis</span>
            <span class="dot" aria-hidden="true"></span>
          </div>
          <div class="step-divider"></div>
          <div class="step-row" data-step="4">
            <span class="roman">V.</span>
            <span class="step-name">Complete</span>
            <span class="dot" aria-hidden="true"></span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="result-block" id="single-result" hidden></div>
      </section>

      <div class="section-divider" aria-hidden="true">
        <div class="divider-rule"></div>
        <div class="divider-mark">&#10022;</div>
      </div>

      <section id="results-section" aria-labelledby="results-label">
        <p class="section-label" id="results-label">02 — Results</p>
        <div class="results-actions">
          <button id="show-results" type="button">Show All Results &rarr;</button>
        </div>
        <div class="results-list" id="results"></div>
      </section>
    </main>

    <script>
      const API_BASE = window.location.protocol === "file:" ? "http://localhost:8000" : window.location.origin;
      const API_CANDIDATES =
        window.location.protocol === "file:"
          ? [
              "http://localhost:8000",
              "http://127.0.0.1:8000",
              "http://localhost:8001",
              "http://127.0.0.1:8001",
              "http://localhost:8010",
              "http://127.0.0.1:8010",
              "http://localhost:8013",
              "http://127.0.0.1:8013"
            ]
          : [API_BASE];
      const stepDelay = 3500;
      const fields = [
        ["website_name", "Website Name"],
        ["company_name", "Company Name"],
        ["address", "Address"],
        ["mobile_number", "Mobile Number"],
        ["mail", "Mail"],
        ["core_service", "Core Service"],
        ["target_customer", "Target Customer"],
        ["probable_pain_point", "Probable Pain Point"],
        ["outreach_opener", "Outreach Opener"]
      ];

      const form = document.querySelector("#enrich-form");
      const enrichButton = document.querySelector("#enrich-button");
      const stepper = document.querySelector("#stepper");
      const stepRows = Array.from(document.querySelectorAll(".step-row"));
      const progressFill = document.querySelector("#progress-fill");
      const singleResult = document.querySelector("#single-result");
      const resultsContainer = document.querySelector("#results");
      const toast = document.querySelector("#toast");
      const toastText = document.querySelector("#toast-text");
      let stepTimer = null;
      let toastTimer = null;

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function displayValue(value) {
        if (Array.isArray(value)) return value.length ? value : "—";
        if (value === null || value === undefined) return "—";
        const normalized = String(value).trim();
        return normalized ? normalized : "—";
      }

      function normalizeMail(value) {
        if (Array.isArray(value)) return value.map((item) => String(item).trim()).filter(Boolean);
        if (typeof value === "string") return value.split(",").map((item) => item.trim()).filter(Boolean);
        return [];
      }

      function toastMessage(message) {
        clearTimeout(toastTimer);
        toastText.textContent = message;
        toast.classList.add("show");
        toastTimer = setTimeout(() => {
          toast.classList.remove("show");
        }, 3000);
      }

      async function apiFetch(path, options) {
        let lastError = null;
        for (const base of API_CANDIDATES) {
          try {
            const response = await fetch(`${base}${path}`, options);
            if (response.ok) return response;
            const errorText = await response.text();
            lastError = new Error(`HTTP ${response.status} from ${base}: ${errorText}`);
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("API unavailable");
      }

      function setStep(index) {
        stepRows.forEach((row, rowIndex) => {
          row.classList.toggle("done", rowIndex < index);
          row.classList.toggle("active", rowIndex === index);
        });
        progressFill.style.width = `${Math.min((index / (stepRows.length - 1)) * 100, 100)}%`;
      }

      function startStepper() {
        let index = 0;
        clearInterval(stepTimer);
        stepper.hidden = false;
        stepper.classList.remove("is-fading");
        progressFill.style.transition = "none";
        progressFill.style.width = "0%";
        progressFill.offsetHeight;
        progressFill.style.transition = `width ${stepDelay}ms linear`;
        setStep(index);
        stepTimer = setInterval(() => {
          index = Math.min(index + 1, stepRows.length - 1);
          setStep(index);
          if (index === stepRows.length - 1) clearInterval(stepTimer);
        }, stepDelay);
      }

      function completeStepper() {
        clearInterval(stepTimer);
        stepRows.forEach((row) => {
          row.classList.remove("active");
          row.classList.add("done");
        });
        progressFill.style.width = "100%";
        setTimeout(() => {
          stepper.classList.add("is-fading");
          setTimeout(() => {
            stepper.hidden = true;
            stepper.classList.remove("is-fading");
          }, 650);
        }, 500);
      }

      function failStepper() {
        clearInterval(stepTimer);
        stepper.classList.add("is-fading");
        setTimeout(() => {
          stepper.hidden = true;
          stepper.classList.remove("is-fading");
          stepRows.forEach((row) => row.classList.remove("active", "done"));
          progressFill.style.width = "0%";
        }, 650);
      }

      function renderField(profile, key, label) {
        if (key === "mail") {
          const mails = normalizeMail(profile[key]);
          const content = mails.length
            ? `<div class="mail-list">${mails.map((mail) => `<span class="mail-pill">${escapeHtml(mail)}</span>`).join("")}</div>`
            : "—";
          return `<div class="field-row"><div class="field-label">${label}</div><div class="field-value">${content}</div></div>`;
        }

        if (key === "outreach_opener") {
          const value = displayValue(profile[key]);
          return `
            <div class="field-row">
              <div class="field-label">${label}</div>
              <div class="field-value">
                <div class="outreach-text">${escapeHtml(value)}</div>
                <button class="copy-button" type="button" data-copy="${escapeHtml(value)}">Copy &rarr;</button>
              </div>
            </div>
          `;
        }

        return `
          <div class="field-row">
            <div class="field-label">${label}</div>
            <div class="field-value">${escapeHtml(displayValue(profile[key]))}</div>
          </div>
        `;
      }

      function renderProfile(profile) {
        const title = displayValue(profile.company_name) !== "—" ? displayValue(profile.company_name) : displayValue(profile.website_name);
        const url = displayValue(profile.url || profile.website_url || profile.domain);
        return `
          <article>
            <h2 class="company-heading">${escapeHtml(title)}</h2>
            <p class="company-url">${escapeHtml(url)}</p>
            <div class="full-rule"></div>
            <div class="fields">
              ${fields.map(([key, label]) => renderField(profile, key, label)).join("")}
            </div>
          </article>
        `;
      }

      function truncate(value, maxLength = 60) {
        const text = displayValue(value);
        if (text === "—") return text;
        return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
      }

      function renderEmptyState() {
        return `
          <div class="empty-state">
            <p class="empty-main">No intelligence gathered yet.</p>
            <p class="empty-sub">Begin above ↑</p>
          </div>
        `;
      }

      function renderResults(profiles) {
        if (!profiles.length) {
          resultsContainer.innerHTML = renderEmptyState();
          return;
        }

        resultsContainer.innerHTML = profiles
          .map((profile, index) => {
            const title = displayValue(profile.company_name) !== "—" ? displayValue(profile.company_name) : displayValue(profile.website_name);
            return `
              <article class="result-row">
                <div class="result-summary">
                  <div class="list-company">${escapeHtml(title)}</div>
                  <div class="list-service">${escapeHtml(truncate(profile.core_service))}</div>
                  <button class="view-button" type="button" data-index="${index}">View &rarr;</button>
                </div>
                <div class="expanded-content">
                  <div class="expanded-line"></div>
                  <div class="expanded-inner">
                    ${fields.map(([key, label]) => renderField(profile, key, label)).join("")}
                  </div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function copyText(text, button) {
        try {
          await navigator.clipboard.writeText(text === "—" ? "" : text);
          const original = button.textContent;
          button.textContent = "Copied";
          setTimeout(() => {
            button.textContent = original;
          }, 2000);
        } catch (error) {
          console.error("Copy failed:", error);
          toastMessage("ENRICHMENT FAILED — CHECK URL");
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = {
          website_name: document.querySelector("#website-name").value.trim(),
          url: document.querySelector("#company-url").value.trim()
        };

        singleResult.hidden = true;
        singleResult.classList.remove("is-visible");
        enrichButton.disabled = true;
        startStepper();

        try {
          const response = await apiFetch("/enrich", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const profile = await response.json();
          profile.url = profile.url || payload.url;
          singleResult.innerHTML = renderProfile(profile);
          completeStepper();
          toastMessage("RESULT SAVED");
          setTimeout(() => {
            singleResult.hidden = false;
            singleResult.offsetHeight;
            singleResult.classList.add("is-visible");
            singleResult.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 1250);
        } catch (error) {
          console.error("Enrichment failed:", error);
          failStepper();
          toastMessage("ENRICHMENT FAILED — CHECK URL");
        } finally {
          enrichButton.disabled = false;
        }
      });

      document.querySelector("#show-results").addEventListener("click", async () => {
        try {
          const response = await apiFetch("/results");
          const profiles = await response.json();
          renderResults(Array.isArray(profiles) ? profiles : []);
        } catch (error) {
          console.error("Loading results failed:", error);
          toastMessage("ENRICHMENT FAILED — CHECK URL");
          renderResults([]);
        }
      });

      document.addEventListener("click", (event) => {
        const copyButton = event.target.closest(".copy-button");
        if (copyButton) {
          copyText(copyButton.dataset.copy || "", copyButton);
          return;
        }

        const viewButton = event.target.closest(".view-button");
        if (viewButton) {
          const row = viewButton.closest(".result-row");
          const isOpen = row.classList.toggle("open");
          viewButton.innerHTML = isOpen ? "Close &rarr;" : "View &rarr;";
        }
      });

      renderResults([]);
    </script>
  </body>
</html>
